<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Runner</title>
</head>
<body>
<script>
// Base64デコード
function decode(str){
  return decodeURIComponent(escape(atob(str)));
}

// hashを取得
const hash = location.hash.substring(1);

// フォーマット: html|css|js（Base64）
if(hash){
  try {
    const parts = hash.split(".");
    
    const html = decode(parts[0] || "");
    const css  = decode(parts[1] || "");
    const js   = decode(parts[2] || "");

    // HTML描画
    document.open();
    document.write(`
      <!DOCTYPE html>
      <html>
      <head>
        <style>${css}</style>
      </head>
      <body>
        ${html}
        <script>${js}<\/script>
      </body>
      </html>
    `);
    document.close();

  } catch(e){
    document.body.innerText = "エラー: URL壊れてる";
  }
}else{
  document.body.innerText = "コードがありません";
}
</script>
</body>
</html>
